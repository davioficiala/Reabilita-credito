<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Crédito</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1e2a38;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.card{
background:#f8fafc;
padding:15px;
margin-top:15px;
border-radius:8px;
border:1px solid #ddd;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
color:#333;
}

#cadastro,
#login,
#adminPanel{
display:none;
}

</style>
</head>

<body>

<header>

<h1>💳 Sistema de Crédito</h1>

<p>Análise financeira inteligente</p>

</header>

<!-- HOME -->

<div class="container" id="home">

<h2>Bem-vindo</h2>

<button onclick="abrirCadastro()">
Cadastrar Cliente
</button>

<button onclick="abrirLogin()">
Login Administrador
</button>

</div>

<!-- CADASTRO -->

<div class="container" id="cadastro">

<h2>Cadastro Cliente</h2>

<input id="nome" placeholder="Nome completo">

<input id="cpf" placeholder="CPF">

<input id="rg" placeholder="RG">

<input id="email" placeholder="E-mail">

<input id="telefone" placeholder="Telefone">

<label>Data Nascimento</label>

<input
id="nascimento"
type="date"
onchange="calcularIdade()"
>

<label>Idade</label>

<input
id="idade"
readonly
>

<label>Data Cadastro</label>

<input
id="dataCadastro"
readonly
>

<input id="renda" placeholder="Renda mensal">

<input id="atrasos" placeholder="Quantidade atrasos">

<input id="dividas" placeholder="Possui dívidas? (sim/não)">

<input id="rua" placeholder="Rua">

<input id="numero" placeholder="Número">

<input id="bairro" placeholder="Bairro">

<input id="cidade" placeholder="Cidade">

<input id="estado" placeholder="Estado">

<button onclick="cadastrarCliente()">
Enviar Cadastro
</button>

<p id="resultado"></p>

<button onclick="voltarHome()">
Voltar
</button>

</div>

<!-- LOGIN -->

<div class="container" id="login">

<h2>🔐 Login Administrador</h2>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<button onclick="loginAdmin()">
Entrar
</button>

<p id="msg"></p>

<button onclick="voltarHome()">
Voltar
</button>

</div>

<!-- ADMIN -->

<div class="container" id="adminPanel">

<h2>📊 Painel Admin</h2>

<div class="card">

<h3>📈 Informações Sistema</h3>

<p id="relogio"></p>

<p id="totalClientes">
👥 Clientes cadastrados: 0
</p>

<p id="mediaRenda">
💰 Média renda: R$ 0
</p>

<p id="mediaScore">
📊 Média score: 0
</p>

<p id="clientesDivida">
⚠ Clientes com dívida: 0
</p>

</div>

<input id="buscarCpf" placeholder="Digite CPF cliente">

<button onclick="buscarCliente()">
Buscar Cliente
</button>

<div id="resultadoBusca"></div>

<button onclick="sair()">
Sair
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "SUA_API_KEY",

authDomain: "sistema-credito-9f4cb.firebaseapp.com",

projectId: "sistema-credito-9f4cb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// RELÓGIO

setInterval(()=>{

let agora = new Date();

document.getElementById("relogio").innerHTML =

"🕒 " + agora.toLocaleTimeString("pt-BR");

},1000);


// CALCULAR IDADE

window.calcularIdade = function(){

let nasc =
document.getElementById("nascimento").value;

let hoje = new Date();

let dataNasc = new Date(nasc);

let idade =
hoje.getFullYear() - dataNasc.getFullYear();

let mes =
hoje.getMonth() - dataNasc.getMonth();

if(
mes < 0 ||
(mes === 0 &&
hoje.getDate() < dataNasc.getDate())
){

idade--;

}

document.getElementById("idade").value =
idade + " anos";

}


// HOME

window.abrirCadastro = function(){

document.getElementById("home").style.display = "none";

document.getElementById("cadastro").style.display = "block";

document.getElementById("dataCadastro").value =
new Date().toLocaleDateString("pt-BR");

}

window.abrirLogin = function(){

document.getElementById("home").style.display = "none";

document.getElementById("login").style.display = "block";

}

window.voltarHome = function(){

document.getElementById("home").style.display = "block";

document.getElementById("cadastro").style.display = "none";

document.getElementById("login").style.display = "none";

}


// LOGIN ADMIN

window.loginAdmin = async function(){

let u = document.getElementById("user").value;

let p = document.getElementById("pass").value;

if(u === "admin" && p === "1234"){

document.getElementById("login").style.display = "none";

document.getElementById("adminPanel").style.display = "block";

carregarDashboard();

}else{

document.getElementById("msg").innerText =
"❌ Login inválido";

}

}


// DASHBOARD

window.carregarDashboard = async function(){

const querySnapshot =
await getDocs(collection(db, "clientes"));

let total = 0;

let somaRenda = 0;

let somaScore = 0;

let dividas = 0;

querySnapshot.forEach((doc)=>{

let c = doc.data();

total++;

somaRenda += Number(c.renda || 0);

somaScore += Number(c.score || 0);

if(c.dividas === "sim"){

dividas++;

}

});

let mediaRenda =
(total > 0)
? (somaRenda / total).toFixed(2)
: 0;

let mediaScore =
(total > 0)
? (somaScore / total).toFixed(0)
: 0;

document.getElementById("totalClientes").innerHTML =
"👥 Clientes cadastrados: " + total;

document.getElementById("mediaRenda").innerHTML =
"💰 Média renda: R$ " + mediaRenda;

document.getElementById("mediaScore").innerHTML =
"📊 Média score: " + mediaScore;

document.getElementById("clientesDivida").innerHTML =
"⚠ Clientes com dívida: " + dividas;

}


// CADASTRO CLIENTE

window.cadastrarCliente = async function(){

let nome = document.getElementById("nome").value;

let cpf = document.getElementById("cpf").value;

let rg = document.getElementById("rg").value;

let email = document.getElementById("email").value;

let telefone = document.getElementById("telefone").value;

let nascimento =
document.getElementById("nascimento").value;

let idade =
document.getElementById("idade").value;

let dataCadastro =
document.getElementById("dataCadastro").value;

let renda = parseFloat(
document.getElementById("renda")
.value
.replace("R$","")
.replace(/\./g,"")
.replace(",",".")
.trim()
) || 0;

let atrasos = parseInt(
document.getElementById("atrasos").value
) || 0;

let dividas =
document.getElementById("dividas").value;

let rua = document.getElementById("rua").value;

let numero = document.getElementById("numero").value;

let bairro = document.getElementById("bairro").value;

let cidade = document.getElementById("cidade").value;

let estado = document.getElementById("estado").value;


// SCORE

let score = 500;

if(renda >= 1500){

score += 50;

}

if(renda >= 3000){

score += 100;

}

if(renda >= 5000){

score += 150;

}

score -= atrasos * 80;

if(dividas.toLowerCase() === "sim"){

score -= 250;

}

if(score < 0){

score = 0;

}

if(score > 1000){

score = 1000;

}


// STATUS

let status = "";

if(score >= 700){

status = "🟢 Excelente";

}else if(score >= 400){

status = "🟡 Médio";

}else{

status = "🔴 Baixo";

}


// FIREBASE

await setDoc(doc(db, "clientes", cpf), {

nome,
cpf,
rg,
email,
telefone,
nascimento,
idade,
dataCadastro,
renda,
atrasos,
dividas,
rua,
numero,
bairro,
cidade,
estado,
score,
status

});

document.getElementById("resultado").innerHTML =

`
✔ Cadastro enviado com sucesso<br><br>

📊 Score: ${score}<br>

⚖ ${status}
`;

carregarDashboard();

}


// BUSCAR CLIENTE

window.buscarCliente = async function(){

let cpf = document.getElementById("buscarCpf").value;

const ref = doc(db, "clientes", cpf);

const snap = await getDoc(ref);

if(snap.exists()){

let c = snap.data();

document.getElementById("resultadoBusca").innerHTML = `

<div class="card">

<h3>Cliente Encontrado</h3>

<label>CPF</label>
<input id="cpfEdit" value="${c.cpf}" disabled>

<label>Nome</label>
<input id="nomeEdit" value="${c.nome}" disabled>

<label>RG</label>
<input id="rgEdit" value="${c.rg}" disabled>

<label>E-mail</label>
<input id="emailEdit" value="${c.email}" disabled>

<label>Telefone</label>
<input id="telefoneEdit" value="${c.telefone}" disabled>

<label>Data Nascimento</label>
<input id="nascimentoEdit" value="${c.nascimento}" disabled>

<label>Idade</label>
<input id="idadeEdit" value="${c.idade}" disabled>

<label>Data Cadastro</label>
<input id="dataCadastroEdit" value="${c.dataCadastro}" disabled>

<label>Renda</label>
<input id="rendaEdit" value="${c.renda}" disabled>

<label>Atrasos</label>
<input id="atrasosEdit" value="${c.atrasos}" disabled>

<label>Dívidas</label>
<input id="dividasEdit" value="${c.dividas}" disabled>

<label>Rua</label>
<input id="ruaEdit" value="${c.rua}" disabled>

<label>Número</label>
<input id="numeroEdit" value="${c.numero}" disabled>

<label>Bairro</label>
<input id="bairroEdit" value="${c.bairro}" disabled>

<label>Cidade</label>
<input id="cidadeEdit" value="${c.cidade}" disabled>

<label>Estado</label>
<input id="estadoEdit" value="${c.estado}" disabled>

<label>Score</label>
<input id="scoreEdit" value="${c.score}" disabled>

<label>Status</label>
<input id="statusEdit" value="${c.status}" disabled>

<button onclick="editarCliente()">
Alterar Dados
</button>

<button onclick="salvarAlteracoes()">
Salvar Alterações
</button>

</div>

`;

}else{

document.getElementById("resultadoBusca").innerHTML =
"❌ Cliente não encontrado";

}

}


// EDITAR CLIENTE

window.editarCliente = function(){

document.getElementById("nomeEdit").disabled = false;

document.getElementById("rgEdit").disabled = false;

document.getElementById("emailEdit").disabled = false;

document.getElementById("telefoneEdit").disabled = false;

document.getElementById("nascimentoEdit").disabled = false;

document.getElementById("idadeEdit").disabled = false;

document.getElementById("rendaEdit").disabled = false;

document.getElementById("atrasosEdit").disabled = false;

document.getElementById("dividasEdit").disabled = false;

document.getElementById("ruaEdit").disabled = false;

document.getElementById("numeroEdit").disabled = false;

document.getElementById("bairroEdit").disabled = false;

document.getElementById("cidadeEdit").disabled = false;

document.getElementById("estadoEdit").disabled = false;

}


// SALVAR ALTERAÇÕES

window.salvarAlteracoes = async function(){

let cpf =
document.getElementById("cpfEdit").value;

let renda = parseFloat(
document.getElementById("rendaEdit")
.value
.replace("R$","")
.replace(/\./g,"")
.replace(",",".")
.trim()
) || 0;

let atrasos = parseInt(
document.getElementById("atrasosEdit").value
) || 0;

let dividas =
document.getElementById("dividasEdit").value;


// SCORE

let score = 500;

if(renda >= 1500){

score += 50;

}

if(renda >= 3000){

score += 100;

}

if(renda >= 5000){

score += 150;

}

score -= atrasos * 80;

if(dividas.toLowerCase() === "sim"){

score -= 250;

}

if(score < 0){

score = 0;

}

if(score > 1000){

score = 1000;

}


// STATUS

let status = "";

if(score >= 700){

status = "🟢 Excelente";

}else if(score >= 400){

status = "🟡 Médio";

}else{

status = "🔴 Baixo";

}


// FIREBASE

await setDoc(doc(db, "clientes", cpf), {

nome:
document.getElementById("nomeEdit").value,

rg:
document.getElementById("rgEdit").value,

email:
document.getElementById("emailEdit").value,

telefone:
document.getElementById("telefoneEdit").value,

nascimento:
document.getElementById("nascimentoEdit").value,

idade:
document.getElementById("idadeEdit").value,

dataCadastro:
document.getElementById("dataCadastroEdit").value,

renda:
renda,

atrasos:
atrasos,

dividas:
dividas,

rua:
document.getElementById("ruaEdit").value,

numero:
document.getElementById("numeroEdit").value,

bairro:
document.getElementById("bairroEdit").value,

cidade:
document.getElementById("cidadeEdit").value,

estado:
document.getElementById("estadoEdit").value,

score:
score,

status:
status

}, { merge:true });

document.getElementById("scoreEdit").value =
score;

document.getElementById("statusEdit").value =
status;

alert("✔ Dados atualizados");

carregarDashboard();

}


// SAIR

window.sair = function(){

location.reload();

}

</script>

</body>
</html>
